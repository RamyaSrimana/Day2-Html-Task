<!DOCTYPE html>
<html>
<head>
  <title>KKR vs CSK</title>

  <style>
    body {
      background-color: purple; 
      text-align: center;
      padding-top: 100px;
      font-family: Arial;
    }

    .box {
      width: 250px;
      padding: 30px;
      margin: auto;
      background-color: yellow;
      border: 3px solid black;
      border-radius: 10px;
    }

    h1 {
      color: white;
    }
  </style>
</head>

<body>

  <h1>KKR Team </h1>

  <div class="box">
    <h2>CSK Team </h2>
    <button onclick="showMessage()">
      Click Me
    </button>
  </div>

  <script>
    function showMessage() {
      alert("KKR vs CSK ");
      console.log("Button clicked");
    }
  </script>

</body>
</html>
