<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Box Model Demo</title>

    <style>
        body {
            background-color: rgb(216, 127, 127);
            display: flex;
            justify-content: center;  
            align-items: center;      
            height: 100vh;       
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;  
            align-items: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .box {
            background-color: lightblue;  
            padding: 20px;               
            border: 5px solid black;   
            margin: 20px;              
            width: 50%;
            text-align: justify;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Box Model Demo</h1>

        <div class="box">

</html>
