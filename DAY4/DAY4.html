<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cake Workshop Registration</title>
<style>
    header{
        text-align: center;
        color: rgb(168, 126, 207);
    }
    label{
        font-weight: bold;
    }
    form{
        background-color: rgb(231, 215, 215);
        width:300px;
        border-radius: 10px;
        padding: 10px;
        margin: auto;
    }
    form h2{
        text-align: center;
    }
</style>
</head>

<body>

<header>
    <h1>Registration for Cake Workshop</h1>
    <nav>
       <mark><a href="Day3.html" >Workshop Details</a></mark> 
    </nav>
</header>

<hr>

<div>
<form>

<h2>Register Here</h2>

<label for="username">Name:</label>
<input type="text" id="username" placeholder="Enter your name" required>
<br><br>

<label for="email">Email:</label>
<input type="email" id="email"  placeholder="Enter your email" required>
<br><br>

<label for="number">Mobile Number:</label>
<input type="tel" id="number"  placeholder="Enter mobile number">
<br><br>

<label>Choose Class Slot:</label><br>

<input type="checkbox" id="slot1" >
<label for="slot1">15/03/2026</label><br>

<input type="checkbox" id="slot2" >
<label for="slot2">20/03/2026</label><br>

<input type="checkbox" id="slot3">
<label for="slot3">25/03/2026</label><br>

<input type="checkbox" id="slot4" >
<label for="slot4">30/03/2026</label>

<br>

<label for="comments">Comments / Questions:</label><br>
<textarea id="comments" rows="10" cols="35" placeholder="Ask your doubts"></textarea>

<br>

<button type="submit" >Register</button>
<button type="reset" onclick = "alert('Are you sure to clear this Form')">Clear</button>

</form>
</div>


</body>
</html>
