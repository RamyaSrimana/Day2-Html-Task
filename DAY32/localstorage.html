<!DOCTYPE html>
<html>
<head>
  <title>Storage Demo</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: lightgray;
    }

    .box {
      width: 250px;
      padding: 15px;
      margin: 20px auto;
      background-color: white;
      border: 1px solid black;
      border-radius: 8px;
    }

    button {
      width: 150px;
      padding: 8px;
      margin: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: lightblue;
    }
  </style>
</head>

<body>

  <div class="box">
    <h3>Local Storage</h3>
    <button onclick="saveLocal()">Save</button>
    <button onclick="removeLocal()">Remove</button>
  </div>

  <div class="box">
    <h3>Session Storage</h3>
    <button onclick="saveSession()">Save</button>
    <button onclick="removeSession()">Remove</button>
  </div>

<script>
function saveLocal(){
  localStorage.setItem("name","Ramya");
  alert("Saved in Local Storage");
}

function removeLocal(){
  localStorage.removeItem("name");
  alert("Removed from Local Storage");
}

function saveSession(){
  sessionStorage.setItem("name","Srimana");
  alert("Saved in Session Storage");
}

function removeSession(){
  sessionStorage.removeItem("name");
  alert("Removed from Session Storage");
}
</script>

</body>
</html>
