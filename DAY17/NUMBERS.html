<!DOCTYPE html>
<html>
<head>
<title>Positive or Negative</title>
</head>
<body>

<h2>Check Number</h2>

<input type="number" id="num" placeholder="Enter a number"><br><br>
<button onclick="checkNumber()">Check</button><br>

<p id="result"></p>
<script>
function checkNumber() {
  let number = document.getElementById("num").value;

  if (number > 0) {
    document.getElementById("result").innerHTML = "Positive Number";
  } else if (number < 0) {
    document.getElementById("result").innerHTML = "Negative Number";
  } else {
    document.getElementById("result").innerHTML = "Zero";
  }
}
</script>
</body>
</html>
